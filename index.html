<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Central de Conhecimento da Vigilância Sanitária de Maravilha/SC</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <div class="eyebrow">Vigilância Sanitária</div>
        <h1>Central de Conhecimento da Vigilância Sanitária de Maravilha/SC</h1>
      </div>
      <div class="top-actions">
        <button id="btnPrint" title="Imprimir orientação atual">Imprimir</button>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <div class="search-box">
          <input id="searchInput" type="search" placeholder="Pesquisar: pia, manipulação, alvará..." autocomplete="off" />
        </div>
        <nav id="tree" class="tree" aria-label="Árvore de assuntos"></nav>
      </aside>

      <section class="content">
        <div id="breadcrumb" class="breadcrumb"></div>
        <article id="view" class="card"></article>
      </section>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
