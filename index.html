<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Central de Conhecimento da Vigilância Sanitária de Maravilha/SC">
  <meta name="theme-color" content="#f7f9fc">
  <title>Central de Conhecimento da Vigilância Sanitária de Maravilha/SC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a class="skip-link" href="#conteudo">Ir para o conteúdo</a>
  <div class="app-shell">
    <header class="site-header">
      <button class="icon-button mobile-only" id="menuButton" aria-label="Abrir menu" data-icon="menu"></button>
      <a class="brand" href="#inicio" aria-label="Página inicial">
        <span class="brand-mark" data-icon="shield"></span>
        <span class="brand-text">
          <strong>Central de Conhecimento</strong>
          <small>Vigilância Sanitária de Maravilha/SC</small>
        </span>
      </a>
      <button class="search-trigger" id="searchTrigger" type="button">
        <span data-icon="search"></span><span>Pesquisar</span><kbd>/</kbd>
      </button>
    </header>

    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <nav id="navigation" aria-label="Navegação principal"></nav>
        <div class="sidebar-footer">
          <a href="#canais" data-icon-link="phone">Canais oficiais</a>
          <small>Atualizado em junho de 2026</small>
        </div>
      </aside>

      <main class="main" id="conteudo" tabindex="-1">
        <div id="breadcrumb" class="breadcrumb" aria-label="Navegação estrutural"></div>
        <section id="view" class="view"></section>
      </main>
    </div>
  </div>

  <dialog class="search-dialog" id="searchDialog">
    <form method="dialog" class="search-dialog-head">
      <span data-icon="search"></span>
      <input id="searchInput" type="search" autocomplete="off" placeholder="Digite uma dúvida ou assunto..." aria-label="Pesquisar conteúdo">
      <button class="icon-button" value="cancel" aria-label="Fechar pesquisa" data-icon="close"></button>
    </form>
    <div id="searchResults" class="search-results"></div>
  </dialog>

  <script src="configuracao.js"></script>
  <script src="dados/fontes.js"></script>
  <script src="dados/alimentacao/area.js"></script>
  <script src="dados/alimentacao/categorias/01-entendendo-a-vigilancia.js"></script>
  <script src="dados/alimentacao/categorias/02-abrir-mudar-ampliar.js"></script>
  <script src="dados/alimentacao/categorias/03-estrutura-e-ambiente.js"></script>
  <script src="dados/alimentacao/categorias/04-manipuladores.js"></script>
  <script src="dados/alimentacao/categorias/05-compra-e-armazenamento.js"></script>
  <script src="dados/alimentacao/categorias/06-preparo-seguro.js"></script>
  <script src="dados/alimentacao/categorias/07-temperaturas-e-delivery.js"></script>

  <script src="dados/alimentacao/categorias/12-consumidores-e-fiscalizacao.js"></script>
  <script src="app.js"></script>
